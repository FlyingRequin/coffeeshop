name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/berlin-kids-itinerary-site-063sq5
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Publishing to a gh-pages branch auto-enables Pages on public repos,
      # which the workflow token is not allowed to do via the Pages API.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
